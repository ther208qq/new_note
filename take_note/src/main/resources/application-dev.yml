spring:
  #应用名称
  application:
    name: take-note

  cloud:
    nacos:
      server-addr: 192.168.88.100:8848

    openfeign:
      okhttp:
        enabled:true

  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/notes_database?serverTimezone=Asia/Shanghai&characterEncoding=utf-8
    username: root
    password: 1234

mybatis:
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  mapper-locations: classpath:**mapper/*.xml